version: '3'

services:
  postgres:
    container_name: postgres-labor-exchange
    image: postgres
    restart: always
    environment:
      - POSTGRES_DB=labor-exchange
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - PGUSER=labor-exchange
    volumes:
       - postgres:/data/postgres
    ports:
      - '5433:5432'
volumes:
    postgres:
